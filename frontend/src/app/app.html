<app-loader />
<app-toast-container />

<div class="app-shell">
  @if (isAuthenticated() && user(); as currentUser) {
    <nav class="navbar navbar-expand-lg app-navbar">
      <div class="container">
        <a class="navbar-brand" routerLink="/chat">SSInfoChat</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#appNav"
          aria-controls="appNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="appNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" routerLink="/chat" routerLinkActive="active">Chat</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/calendar" routerLinkActive="active">Calendar</a>
            </li>
          </ul>

          <div class="d-flex align-items-center gap-3">
            <div class="user-info text-end">
              <div class="label">Signed in as</div>
              <div class="name">{{ currentUser.name }}</div>
            </div>
            <button class="btn btn-outline-secondary btn-sm" type="button" (click)="logout()">
              Logout
            </button>
          </div>
        </div>
      </div>
    </nav>
  }

  <main class="app-content">
    <router-outlet />
  </main>
</div>
